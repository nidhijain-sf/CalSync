<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#032D60"/>
      <stop offset="100%" style="stop-color:#0a4a8a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00A1E0"/>
      <stop offset="100%" style="stop-color:#0070d2"/>
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7dd3fc"/>
      <stop offset="100%" style="stop-color:#00A1E0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="190" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Outer ring -->
  <circle cx="200" cy="200" r="182" fill="none" stroke="#00A1E0" stroke-width="1.5" opacity="0.3"/>
  <circle cx="200" cy="200" r="170" fill="none" stroke="#00A1E0" stroke-width="0.5" opacity="0.15"/>

  <!-- Neural network dots (background) -->
  <circle cx="80" cy="120" r="4" fill="#00A1E0" opacity="0.4"/>
  <circle cx="130" cy="80" r="3" fill="#7dd3fc" opacity="0.35"/>
  <circle cx="320" cy="110" r="4" fill="#00A1E0" opacity="0.4"/>
  <circle cx="270" cy="75" r="3" fill="#7dd3fc" opacity="0.3"/>
  <circle cx="75" cy="280" r="3.5" fill="#00A1E0" opacity="0.35"/>
  <circle cx="325" cy="290" r="4" fill="#00A1E0" opacity="0.4"/>
  <circle cx="155" cy="320" r="3" fill="#7dd3fc" opacity="0.3"/>
  <circle cx="245" cy="330" r="3.5" fill="#00A1E0" opacity="0.35"/>

  <!-- Neural network lines -->
  <line x1="80" y1="120" x2="130" y2="80" stroke="#00A1E0" stroke-width="0.8" opacity="0.2"/>
  <line x1="130" y1="80" x2="200" y2="100" stroke="#00A1E0" stroke-width="0.8" opacity="0.2"/>
  <line x1="200" y1="100" x2="270" y2="75" stroke="#00A1E0" stroke-width="0.8" opacity="0.2"/>
  <line x1="270" y1="75" x2="320" y2="110" stroke="#00A1E0" stroke-width="0.8" opacity="0.2"/>
  <line x1="75" y1="280" x2="155" y2="320" stroke="#00A1E0" stroke-width="0.8" opacity="0.2"/>
  <line x1="155" y1="320" x2="245" y2="330" stroke="#00A1E0" stroke-width="0.8" opacity="0.2"/>
  <line x1="245" y1="330" x2="325" y2="290" stroke="#00A1E0" stroke-width="0.8" opacity="0.2"/>
  <line x1="80" y1="120" x2="75" y2="280" stroke="#00A1E0" stroke-width="0.8" opacity="0.15"/>
  <line x1="320" y1="110" x2="325" y2="290" stroke="#00A1E0" stroke-width="0.8" opacity="0.15"/>

  <!-- Central hexagon -->
  <polygon points="200,108 248,134 248,186 200,212 152,186 152,134"
           fill="none" stroke="url(#accentGrad)" stroke-width="2" opacity="0.6"/>

  <!-- Lightning bolt / AI spark -->
  <path d="M210 118 L190 165 L205 165 L190 212 L218 158 L202 158 Z"
        fill="url(#sparkGrad)" filter="url(#glow)" opacity="0.95"/>

  <!-- ACE text -->
  <text x="200" y="268"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="58"
        font-weight="800"
        fill="white"
        text-anchor="middle"
        letter-spacing="6">ACE</text>

  <!-- Underline accent -->
  <rect x="130" y="278" width="140" height="3" rx="2" fill="url(#accentGrad)" opacity="0.9"/>

  <!-- Tagline -->
  <text x="200" y="308"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="13"
        font-weight="500"
        fill="#7dd3fc"
        text-anchor="middle"
        letter-spacing="2.5">AI CENTRE OF EXCELLENCE</text>

  <!-- Corner dots -->
  <circle cx="200" cy="355" r="3" fill="#00A1E0" opacity="0.5"/>
  <circle cx="185" cy="355" r="2" fill="#00A1E0" opacity="0.3"/>
  <circle cx="215" cy="355" r="2" fill="#00A1E0" opacity="0.3"/>
</svg>
