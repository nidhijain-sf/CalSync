name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Mac binary
        run: GOOS=darwin GOARCH=amd64 go build -o dist/mac/SyncApp .

      - name: Build Windows binary
        run: GOOS=windows GOARCH=amd64 go build -o dist/windows/SyncApp.exe .

      - name: Create Mac zip (excludes credentials)
        run: |
          cp "docs/HOW TO USE.txt" dist/mac/
          cd dist/mac
          zip -r ../../CalSync-mac-${{ github.ref_name }}.zip . \
            --exclude "*/google_credentials.json" \
            --exclude "*/sf_credentials.json" \
            --exclude "*/google_token.json" \
            --exclude "*/calsync.log"

      - name: Create Windows zip (excludes credentials)
        run: |
          cp "docs/HOW TO USE.txt" dist/windows/
          cd dist/windows
          zip -r ../../CalSync-windows-${{ github.ref_name }}.zip . \
            --exclude "*/google_credentials.json" \
            --exclude "*/sf_credentials.json" \
            --exclude "*/google_token.json" \
            --exclude "*/calsync.log"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            CalSync-mac-${{ github.ref_name }}.zip
            CalSync-windows-${{ github.ref_name }}.zip
          generate_release_notes: true
          body: |
            ## Download

            | Platform | File |
            |---|---|
            | 🍎 Mac | `CalSync-mac-${{ github.ref_name }}.zip` |
            | 🪟 Windows | `CalSync-windows-${{ github.ref_name }}.zip` |

            See the [Installation Guide](https://github.com/nidhijain-sf/CalSync/blob/main/docs/installation.md) for setup instructions.
